services:
  timecard-bridge:
    build: .
    container_name: timecard-bridge
    restart: unless-stopped
    environment:
      SUPABASE_URL: "https://hguvsjpmiyeypfcuvvko.supabase.co"
      SECRET_KEY: "${SECRET_KEY}"
      MQTT_HOST: "10.0.0.180"
      MQTT_USER: "timecard"
      MQTT_PASS: "letmein"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.connect(('10.0.0.180',1883)); s.close()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
