services:
  timecard-bridge:
    build: .
    container_name: timecard-bridge
    restart: unless-stopped
    environment:
      SUPABASE_URL: "${SUPABASE_URL}"
      SECRET_KEY: "${SECRET_KEY}"       # service role key
      MQTT_HOST: "${MQTT_HOST}"
      MQTT_USER: "${MQTT_USER}"
      MQTT_PASS: "${MQTT_PASS}"
      TZ: "${TZ}"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.connect(('10.0.0.180',1883)); s.close()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
